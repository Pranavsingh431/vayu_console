name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# A newer push to the same branch makes an in-flight run obsolete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  api:
    name: API (ruff, black, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app tests

      - name: Test (pytest)
        run: pytest

  web:
    name: Web (prettier, eslint, tsc, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format (prettier)
        run: npm run format:check

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      # Catches errors that only surface at build time, so a broken main can
      # never reach Vercel.
      - name: Build
        run: npm run build

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # This repository is public and the local .env holds live credentials for
      # data.gov.in, NASA FIRMS and NASA Earthdata. Committing it would leak
      # them irreversibly, so the check runs on every push rather than relying
      # on .gitignore alone.
      - name: Ensure no environment file is tracked
        run: scripts/check-secrets.sh
